<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    :root {
        --primary: #4361ee;
        --secondary: #3a0ca3;
        --success: #4cc9f0;
        --warning: #f72585;
    }

    body { 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        margin-top: 20px;
        padding: 30px;
    }

    .product-card { margin-bottom: 20px; }
    .low-stock { border-left: 4px solid #dc3545; }
    .healthy-stock { border-left: 4px solid #28a745; }
    
    .gradient-text {
        background: linear-gradient(45deg, #007bff, #6610f2, #e83e8c);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: bold;
        font-size: 2.5rem;
    }

    /* Add smooth animations */
    .card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .btn {
        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: scale(1.05);
    }

    .dashboard-card {
        transition: all 0.3s ease;
        border: none;
        border-radius: 15px;
    }

    .dashboard-card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .dashboard-icon {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }
    .skeleton-loading 
    {
        padding: 20px;
    }

    .skeleton-line 
    {
        height: 20px;
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
        border-radius: 4px;
        margin-bottom: 15px;
    }

    .skeleton-line:nth-child(2) 
    {
        width: 80%;
    }

    .skeleton-line:nth-child(3) 
    {
        width: 60%;
    }

    .skeleton-line:nth-child(4) 
    {
        width: 90%;
    }

    .skeleton-line:nth-child(5) 
    {
        width: 70%;
    }

    @keyframes loading 
    {
        0% 
        {
            background-position: 200% 0;
        }
        100% 
        {
            background-position: -200% 0;
        }
    }
</style>
</head>
<body>
    <div class="container" style="background: white; border-radius: 15px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 25px; margin-top: 20px;">
        <!-- Professional Navigation Bar -->
<nav class="navbar navbar-dark bg-primary mb-4" style="border-radius: 15px;">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            🏪 <strong>Javer's Inventory Pro</strong>
            <small class="h6" style="font-size: 0.8rem;">Management System</small>
        </span>
        <div class="navbar-nav">
            <span class="nav-link text-white">👤 Welcome, Manager!</span>
        </div>
    </div>
</nav>
        
        <!-- Enhanced Dashboard Summary -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card text-white bg-primary dashboard-card">
            <div class="card-body text-center">
                <div class="dashboard-icon">📦</div>
                <h5>Total Products</h5>
                <h3 id="totalProducts">0</h3>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white bg-success dashboard-card">
            <div class="card-body text-center">
                <div class="dashboard-icon">✅</div>
                <h5>In Stock</h5>
                <h3 id="inStock">0</h3>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white bg-warning dashboard-card">
            <div class="card-body text-center">
                <div class="dashboard-icon">⚠️</div>
                <h5>Low Stock</h5>
                <h3 id="lowStock">0</h3>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white bg-info dashboard-card">
            <div class="card-body text-center">
                <div class="dashboard-icon">💰</div>
                <h5>Total Value</h5>
                <h3 id="totalValue">$0</h3>
            </div>
        </div>
    </div>
</div>

<!-- Add Product Form -->
<div class="card mb-4">
    <div class="card-header">
        <h4>➕ Add New Product</h4>
    </div>
    <div class="card-body">
        <form id="addProductForm">
            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Product Name *</label>
                        <input type="text" class="form-control" id="productName" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" class="form-control" id="productCategory" value="Electronics">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Price ($) *</label>
                        <input type="number" class="form-control" id="productPrice" step="0.01" required>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="productDescription" rows="2"></textarea>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="mb-3">
                        <label class="form-label">Stock Quantity *</label>
                        <input type="number" class="form-control" id="productStock" required>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="mb-3">
                        <label class="form-label">Min Stock Level</label>
                        <input type="number" class="form-control" id="productMinStock" value="5">
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-success">Add Product</button>
            <button type="button" class="btn btn-secondary" onclick="clearForm()">Clear</button>
        </form>
        <div id="formMessage" class="mt-3"></div>
    </div>
</div>

<!-- Search Bar -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row">
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search products...">
                    <button class="btn btn-outline-secondary" type="button" onclick="searchProducts()">
                        🔍 Search
                    </button>
                </div>
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-outline-primary" onclick="loadProducts()">
                    🔄 Refresh All
                </button>
            </div>
        </div>
    </div>
</div>
        <!-- END OF SEARCH BAR -->

        <!-- Products List -->
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h4>Products List</h4>
        <button class="btn btn-primary" onclick="loadProducts()">Refresh Products</button>
    </div>
    <div class="card-body">
        <div id="productsList"></div>
    </div>
</div>
    <!-- Edit Product Modal -->
<div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="editProductModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <form class="modal-content" onsubmit="event.preventDefault(); updateProduct();">
      <div class="modal-header">
        <h5 class="modal-title" id="editProductModalLabel">Edit Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editProductId">
        <div class="mb-3">
          <label class="form-label">Product Name *</label>
          <input type="text" class="form-control" id="editProductName" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" id="editProductDescription" rows="2"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label>
          <input type="text" class="form-control" id="editProductCategory">
        </div>
        <div class="mb-3">
          <label class="form-label">Price ($) *</label>
          <input type="number" class="form-control" id="editProductPrice" step="0.01" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Stock Quantity *</label>
          <input type="number" class="form-control" id="editProductStock" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Min Stock Level</label>
          <input type="number" class="form-control" id="editProductMinStock">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Update Product</button>
      </div>
    </form>
  </div>
</div>
    <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
            <script src="app.js"></script>
    
</body>
</html>
